<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Alert</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 410px;
        height: 450px;
        overflow: hidden;
        background: transparent;
      }

      /* ── STATUS DOT ─────────────────────────────────────── */
      #status-dot {
        position: fixed;
        top: 8px;
        right: 8px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #444;
        z-index: 100;
        transition:
          background 0.3s,
          box-shadow 0.3s,
          opacity 1s;
      }
      #status-dot.connecting {
        background: #ffaa00;
        box-shadow: 0 0 5px #ffaa00;
      }
      #status-dot.connected {
        background: #00ff88;
        box-shadow: 0 0 5px #00ff88;
      }
      #status-dot.error {
        background: #ff4040;
        box-shadow: 0 0 5px #ff4040;
        opacity: 1 !important;
      }

      /* ── THEME VARIABLES (updated by JS per alert type) ─── */
      :root {
        --ch: #00ffcc; /* hex color */
        --c: 0, 255, 204; /* RGB triplet for rgba() */
      }

      /* ── ALERT BOX ──────────────────────────────────────── */
      #alert-box {
        position: absolute;
        inset: 0;
        background: rgba(13, 10, 26, 0.97);
        border: 1px solid rgba(var(--c), 0.35);
        border-radius: 8px;
        box-shadow:
          0 0 24px rgba(var(--c), 0.28),
          0 0 70px rgba(var(--c), 0.12),
          inset 0 0 50px rgba(var(--c), 0.04);
        font-family: 'Courier New', 'Lucida Console', Courier, monospace;
        color: #ffffff;
        opacity: 0;
        pointer-events: none;
      }

      #alert-box.glitch-in {
        animation: glitchIn 0.7s ease-out forwards;
      }
      #alert-box.fade-out {
        animation: fadeOut 0.4s ease-in forwards;
      }

      /* ── SCAN LINE ──────────────────────────────────────── */
      #alert-box.glitch-in::before {
        content: '';
        position: absolute;
        inset: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent 10%,
          var(--ch) 50%,
          transparent 90%
        );
        box-shadow: 0 0 8px var(--ch);
        animation: scanLine 0.65s ease-out;
        z-index: 10;
        pointer-events: none;
      }
      @keyframes scanLine {
        0% {
          top: 0;
          opacity: 1;
        }
        100% {
          top: 100%;
          opacity: 0;
        }
      }

      /* ── PARTICLES ──────────────────────────────────────── */
      #particles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
      }

      /* ── ALERT CONTENT ──────────────────────────────────── */
      .content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 32px 28px;
        z-index: 2;
        text-align: center;
      }

      #alert-icon {
        display: block;
        font-size: 80px;
        line-height: 1;
        margin-bottom: 10px;
        color: var(--ch);
        text-shadow:
          0 0 20px rgba(var(--c), 0.9),
          0 0 45px rgba(var(--c), 0.55),
          0 0 90px rgba(var(--c), 0.3);
      }
      #alert-icon.pulsing {
        animation: iconPulse 1.6s ease-in-out infinite;
      }
      @keyframes iconPulse {
        0%,
        100% {
          text-shadow:
            0 0 20px rgba(var(--c), 0.9),
            0 0 45px rgba(var(--c), 0.55),
            0 0 90px rgba(var(--c), 0.3);
        }
        50% {
          text-shadow:
            0 0 30px rgba(var(--c), 1),
            0 0 65px rgba(var(--c), 0.8),
            0 0 110px rgba(var(--c), 0.5);
        }
      }

      .alert-badge {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--ch);
        opacity: 0.75;
      }

      #alert-username {
        font-size: 34px;
        font-weight: 800;
        color: #ffffff;
        line-height: 1.2;
        word-break: break-word;
        max-width: 100%;
        text-shadow: 0 0 20px rgba(var(--c), 0.25);
      }

      .alert-message {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.65);
        margin-top: 4px;
      }

      /* ── GLITCH KEYFRAMES ───────────────────────────────── */
      @keyframes glitchIn {
        0% {
          opacity: 0;
          transform: translateX(55px) skewX(-12deg);
          filter: blur(8px) hue-rotate(180deg) saturate(3);
        }
        15% {
          opacity: 0.9;
          transform: translateX(-12px) skewX(8deg);
          filter: blur(3px) hue-rotate(90deg) saturate(2);
        }
        30% {
          transform: translateX(8px) skewX(-4deg);
          filter: blur(1px) hue-rotate(40deg);
        }
        48% {
          transform: translateX(-5px) skewX(2deg);
          filter: hue-rotate(15deg);
        }
        65% {
          transform: translateX(2px) skewX(-1deg);
          filter: hue-rotate(5deg);
        }
        85% {
          transform: translateX(-1px);
          filter: hue-rotate(0);
        }
        100% {
          opacity: 1;
          transform: translateX(0) skewX(0);
          filter: none;
        }
      }
      @keyframes fadeOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="status-dot"></div>

    <div id="alert-box">
      <canvas id="particles" width="410" height="450"></canvas>
      <div class="content">
        <span id="alert-icon">⚡</span>
        <div class="alert-badge" id="alert-badge">NEW FOLLOWER</div>
        <div id="alert-username">StreamViewer42</div>
        <div class="alert-message" id="alert-message">
          Welcome to the stream!
        </div>
      </div>
    </div>

    <script>
      // ─── THEMES ──────────────────────────────────────────────────
      const THEMES = {
        follow: {
          ch: '#00ffcc',
          c: '0, 255, 204',
          icon: '⚡',
          badge: 'NEW FOLLOWER',
          message: 'Welcome to the stream!',
        },
        subscribe: {
          ch: '#b06cff',
          c: '176, 108, 255',
          icon: '★',
          badge: 'NEW SUBSCRIBER',
          message: 'Thanks for subscribing!',
        },
      }

      // ─── STATUS DOT ──────────────────────────────────────────────
      const dot = document.getElementById('status-dot')
      function setStatus(s) {
        dot.className = s
      }

      // ─── SERVER SSE ──────────────────────────────────────────────
      function connectSSE() {
        setStatus('connecting')
        const es = new EventSource('/alert-events')
        es.onopen = () => {
          setStatus('connected')
          setTimeout(() => {
            dot.style.opacity = '0'
          }, 3000)
        }
        es.onerror = () => setStatus('error')
        es.onmessage = (ev) => {
          let data
          try {
            data = JSON.parse(ev.data)
          } catch {
            return
          }
          if (data.type === 'follow' || data.type === 'subscribe') {
            enqueueAlert(data.type, data.username)
          }
        }
      }

      // ─── AUDIO ───────────────────────────────────────────────────
      const alertAudio = new Audio('/sounds/dragon-studio-shutdown-386182.mp3')

      // ─── PARTICLES ───────────────────────────────────────────────
      const canvas = document.getElementById('particles')
      const ctx = canvas.getContext('2d')
      let pList = [],
        pRaf = null,
        particleColor = '#00ffcc'

      function spawnParticles() {
        for (let i = 0; i < 45; i++) {
          setTimeout(() => {
            pList.push({
              x: 90 + Math.random() * 230,
              y: 160 + Math.random() * 130,
              vx: (Math.random() - 0.5) * 5,
              vy: -(Math.random() * 5.5 + 1.5),
              r: Math.random() * 4.5 + 1.5,
              life: 1,
              decay: Math.random() * 0.013 + 0.006,
              color: particleColor,
            })
          }, i * 45)
        }
      }

      function runParticles() {
        if (pRaf) cancelAnimationFrame(pRaf)
        function loop() {
          ctx.clearRect(0, 0, 410, 450)
          pList = pList.filter((p) => p.life > 0.01)
          for (const p of pList) {
            ctx.globalAlpha = p.life * 0.88
            ctx.fillStyle = p.color
            ctx.shadowColor = p.color
            ctx.shadowBlur = 10
            ctx.beginPath()
            ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2)
            ctx.fill()
            p.x += p.vx
            p.y += p.vy
            p.vy += 0.14
            p.life -= p.decay
          }
          ctx.globalAlpha = 1
          ctx.shadowBlur = 0
          if (pList.length > 0) pRaf = requestAnimationFrame(loop)
          else pRaf = null
        }
        pRaf = requestAnimationFrame(loop)
      }

      function stopParticles() {
        if (pRaf) {
          cancelAnimationFrame(pRaf)
          pRaf = null
        }
        ctx.clearRect(0, 0, 410, 450)
        pList = []
      }

      // ─── ALERT QUEUE ─────────────────────────────────────────────
      const alertQueue = []
      let alertActive = false
      let hideTimer = null,
        outTimer = null

      function enqueueAlert(type, username) {
        alertQueue.push({ type, username })
        if (!alertActive) processQueue()
      }

      function processQueue() {
        if (alertQueue.length === 0) {
          alertActive = false
          return
        }
        alertActive = true
        const { type, username } = alertQueue.shift()
        showAlert(type, username)
      }

      // ─── ALERT DISPLAY ───────────────────────────────────────────
      const alertBox = document.getElementById('alert-box')
      const iconEl = document.getElementById('alert-icon')
      const badgeEl = document.getElementById('alert-badge')
      const messageEl = document.getElementById('alert-message')
      const usernameEl = document.getElementById('alert-username')
      const root = document.documentElement

      function showAlert(type, username) {
        clearTimeout(hideTimer)
        clearTimeout(outTimer)
        stopParticles()

        const theme = THEMES[type] ?? THEMES.follow
        root.style.setProperty('--ch', theme.ch)
        root.style.setProperty('--c', theme.c)
        particleColor = theme.ch
        iconEl.textContent = theme.icon
        badgeEl.textContent = theme.badge
        messageEl.textContent = theme.message
        usernameEl.textContent = username

        alertBox.className = ''
        alertBox.style.opacity = '0'
        void alertBox.offsetWidth // force reflow

        alertBox.style.opacity = ''
        alertBox.classList.add('glitch-in')
        iconEl.classList.add('pulsing')

        alertAudio.currentTime = 0
        alertAudio.play().catch(() => {})

        spawnParticles()
        runParticles()

        hideTimer = setTimeout(() => {
          iconEl.classList.remove('pulsing')
          alertBox.classList.replace('glitch-in', 'fade-out')
          outTimer = setTimeout(() => {
            alertBox.className = ''
            alertBox.style.opacity = '0'
            stopParticles()
            processQueue()
          }, 400)
        }, 5000)
      }

      // ─── INIT ────────────────────────────────────────────────────
      alertBox.style.opacity = '0'
      dot.style.transition = 'background 0.3s, box-shadow 0.3s, opacity 1s'
      connectSSE()
    </script>
  </body>
</html>
